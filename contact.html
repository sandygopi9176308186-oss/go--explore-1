<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Travel With Us</title>
    <link rel="stylesheet" href="styles.css">
</head>
<style>
    /* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&display=swap');

*{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Cinzel", serif;
}

body {
   
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; 
    background: url('images/cantact\ bg\ .jpg') no-repeat center center/cover;
}

.contact-section {
    position: relative;
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.33);
}

.contact-container {
    position: relative;
    z-index: 2;
    background: rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 10px;
    text-align: center;
    width: 90%;
    max-width: 450px;
    box-shadow: 0 0 10px rgba(135, 228, 146, 0.92);
}

.contact-container h2 {
    color: #fff;
    font-size: 28px;
    margin-bottom: 10px;
}

.contact-container p {
    color: #f3f3f3;
    font-size: 16px;
    margin-bottom: 20px;
}

.input-group {
    position: relative;
    margin-bottom: 20px;
}

.input-group input, .input-group textarea {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 5px;
    color: #fff;
    outline: none;
}

.input-group label {
    position: absolute;
    top: 12px;
    left: 15px;
    color: rgba(255, 255, 255, 0.7);
    transition: 0.3s;
}

.input-group input:focus ~ label, 
.input-group textarea:focus ~ label, 
.input-group input:valid ~ label, 
.input-group textarea:valid ~ label {
    top: -10px;
    left: 10px;
    font-size: 12px;
    color:rgb(15, 246, 27);
}

button {
    width: 100%;
    padding: 12px;
    background:rgb(15, 246, 27);
    border: none;
    border-radius: 5px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: rgb(15, 246, 27);
}
.h2 {
    font-family:  "Cinzel", serif;
}

</style>
<body>

<!-- contact page -->
    <section class="contact-section">
        <div class="overlay"></div>
        <div class="contact-container">
            <h2>Contact Us</h2>
            <p>Have questions? We're here to help you plan your next adventure!</p>
            <form>
                <div class="input-group">
                    <input type="text" name="name" required>
                    <label>Your Name</label>
                </div>
                <div class="input-group">
                    <input type="email" name="email" required>
                    <label>Email Address</label>
                </div>
                <div class="input-group">
                    <textarea name="message" required></textarea>
                    <label>Your Message</label>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </section>
</body>
</html>
